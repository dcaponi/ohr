services:
  db:
    image: pgvector/pgvector:pg16
    container_name: ohr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ohr
      POSTGRES_PASSWORD: ohr
      POSTGRES_DB: ohr
    ports:
      - "5433:5432"
    volumes:
      - ohr-pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ohr -d ohr"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ohr-pgdata:
